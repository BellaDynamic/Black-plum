<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Autumn Trust</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #1A2238; color: #E8E8E8; overflow: hidden; }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            position: relative;
            background-color: #1A2238;
            background-image: 
                linear-gradient(rgba(143, 155, 179, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(143, 155, 179, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Decorative Technical Elements */
        .corner-bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #8F9BB3;
            opacity: 0.6;
        }
        .top-left { top: 40px; left: 40px; border-right: none; border-bottom: none; }
        .top-right { top: 40px; right: 40px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 40px; left: 40px; border-right: none; border-top: none; }
        .bottom-right { bottom: 40px; right: 40px; border-left: none; border-top: none; }

        .content-wrapper {
            text-align: center;
            z-index: 2;
            position: relative;
            padding: 60px;
            border: 1px solid rgba(143, 155, 179, 0.3);
            background: rgba(26, 34, 56, 0.85);
            backdrop-filter: blur(5px);
            max-width: 900px;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -2px;
            color: #E8E8E8;
            margin-bottom: 24px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 300;
            color: #CD5C5C;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .meta-info {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            color: #8F9BB3;
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            border-top: 1px solid rgba(143, 155, 179, 0.3);
            padding-top: 20px;
        }

        /* Node Network Graphic */
        .network-graphic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
        }
        
        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #CD5C5C;
            border-radius: 50%;
        }
        
        .line {
            position: absolute;
            height: 1px;
            background-color: #8F9BB3;
            transform-origin: 0 50%;
        }

    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Technical Decorative Corners -->
        <div class="corner-bracket top-left"></div>
        <div class="corner-bracket top-right"></div>
        <div class="corner-bracket bottom-left"></div>
        <div class="corner-bracket bottom-right"></div>

        <!-- Abstract Network Graphic Background -->
        <div class="network-graphic">
            <!-- Manually placed nodes and lines for visual balance -->
            <div class="node" style="top: 20%; left: 20%;"></div>
            <div class="node" style="top: 30%; left: 80%;"></div>
            <div class="node" style="top: 70%; left: 15%;"></div>
            <div class="node" style="top: 80%; left: 85%;"></div>
            <div class="node" style="top: 15%; left: 50%;"></div>
            
            <div class="line" style="top: 20%; left: 20%; width: 300px; transform: rotate(15deg);"></div>
            <div class="line" style="top: 30%; left: 80%; width: 400px; transform: rotate(160deg);"></div>
            <div class="line" style="top: 70%; left: 15%; width: 500px; transform: rotate(-20deg);"></div>
            <div class="line" style="top: 15%; left: 50%; width: 350px; transform: rotate(45deg);"></div>
        </div>

        <div class="content-wrapper">
            <div style="font-family: 'Space Mono', monospace; color: #CD5C5C; font-size: 14px; margin-bottom: 16px; letter-spacing: 2px;">EST. 2025 // SYSTEM BLUEPRINT</div>
            <h1>Eternal Autumn<br>Trust</h1>
            <div class="subtitle">A Legacy of Purpose, Prosperity & Perpetual Impact</div>
            
            <div class="meta-info">
                <span>AUTH: MANUS AI</span>
                <span>DATE: MARCH 04, 2026</span>
                <span>SEC: CONFIDENTIAL</span>
            </div>
        </div>
    </div>
</body>
</html>
